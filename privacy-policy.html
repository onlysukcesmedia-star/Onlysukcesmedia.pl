<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polityka Prywatności</title>
    <style>
        :root {
            --bg: #f7f7f2;
            --card: #ffffff;
            --text: #1f2125;
            --muted: #5d6270;
            --accent: #e8d400;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Maven Pro", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 0% 0%, rgba(232, 212, 0, 0.16), transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(31, 33, 37, 0.08), transparent 35%),
                var(--bg);
        }

        .wrapper {
            width: min(1040px, 94vw);
            margin: 0 auto;
            padding: 1.25rem 0 2rem;
        }

        .policy-shell {
            background: var(--card);
            border: 1px solid rgba(31, 33, 37, 0.1);
            border-radius: 16px;
            box-shadow: 0 16px 30px rgba(31, 33, 37, 0.1);
            overflow: hidden;
        }

        .policy-head {
            padding: 1.25rem 1.25rem 0.75rem;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.5rem, 3vw, 2.15rem);
        }

        p {
            margin: 0.45rem 0 0;
            color: var(--muted);
        }

        .policy-frame {
            width: 100%;
            min-height: 78vh;
            border: 0;
            background: #fff;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            padding: 0.95rem 1.25rem 1.25rem;
        }

        .btn-link {
            display: inline-block;
            color: #111;
            text-decoration: none;
            font-weight: 700;
            border-bottom: 2px solid var(--accent);
        }

        .btn-link:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <main class="wrapper">
        <section class="policy-shell">
            <div class="policy-head">
                <h1>Polityka Prywatności</h1>
                <p>Nowa wersja dokumentu jest dostępna poniżej.</p>
            </div>

            <iframe
                class="policy-frame"
                src="https://docs.google.com/document/d/1ZQ-aI5o3pnV2yKuEtl6wVdChji2bQ85b-tas00p2UvQ/preview"
                title="Polityka Prywatności"
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>

            <div class="links">
                <a class="btn-link" href="https://docs.google.com/document/d/1ZQ-aI5o3pnV2yKuEtl6wVdChji2bQ85b-tas00p2UvQ/edit?usp=sharing" target="_blank" rel="noopener noreferrer">Otwórz dokument w Google Docs</a>
                <a class="btn-link" href="index.html">Wróć do strony głównej</a>
            </div>
        </section>
    </main>
</body>
</html>
